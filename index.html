<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Mãe</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Cores e Variáveis */
        :root {
            --primary-bg: #fdfbf7;
            --card-bg: #ffffff;
            --text-main: #5d4037;
            --text-accent: #b76e79; /* Rosa antigo / Rose gold */
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body { 
            font-family: 'Lora', serif; 
            background-color: var(--primary-bg); 
            /* Fundo com textura pontilhada muito sutil */
            background-image: radial-gradient(#e6d5c3 1px, transparent 1px);
            background-size: 20px 20px;
            text-align: center; 
            color: var(--text-main); 
            margin: 0;
            padding: 0;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 50px 20px; 
        }

        h1 { 
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: var(--text-accent); 
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8d6e63;
            margin-top: 0;
            margin-bottom: 50px;
            font-style: italic;
        }

        /* Galeria Estilo Polaroid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 25px; 
            margin: 40px 0; 
        }

        .polaroid {
            background: var(--card-bg);
            padding: 12px 12px 45px 12px;
            border-radius: 4px;
            box-shadow: 0 4px 15px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Efeito ao passar o mouse */
        .polaroid:hover {
            transform: translateY(-10px) scale(1.03) !important;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            z-index: 10;
        }

        /* Inclinando as fotos levemente para parecer um álbum real */
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(odd) { transform: rotate(-2deg); }
        .polaroid:nth-child(3n) { transform: rotate(1deg); }

        .polaroid img { 
            width: 100%; 
            height: 250px; /* Mantém as fotos padronizadas */
            object-fit: cover; 
            border-radius: 2px; 
            filter: sepia(15%) contrast(105%); /* Dá um leve ar vintage nas fotos */
        }

        /* Área do Cartão de Mensagem */
        .message-container {
            background-color: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px var(--shadow);
            margin-top: 60px;
            border-top: 6px solid var(--text-accent);
            position: relative;
        }

        .message-container::before {
            content: "❝";
            font-size: 5rem;
            color: #f0e6d2;
            position: absolute;
            top: -30px;
            left: 30px;
            font-family: serif;
        }

        .message { 
            font-size: 1.3em; 
            line-height: 1.8; 
            color: #4e342e;
            margin-bottom: 40px;
            z-index: 1;
            position: relative;
        }

        .highlight {
            font-weight: 600;
            color: var(--text-accent);
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--text-accent);
            margin: 0;
        }

        .signature {
            margin-top: 15px;
            font-size: 1.4rem;
            font-family: 'Dancing Script', cursive;
            color: #8d6e63;
        }

        /* Animação do Coração */
        .heart { 
            color: #e57373; 
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
        }
        
        /* Responsividade para celulares */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .message-container { padding: 30px 20px; }
            .polaroid img { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pensou que eu ia esquecer? <span class="heart">❤️</span></h1>
        <p class="subtitle">Um pequeno álbum de memórias para você</p>
        
        <div class="grid">
            <div class="polaroid"><img src="Foto (1).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (2).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (3).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (4).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (5).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (6).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (7).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (8).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (9).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (10).jpg" alt="Lembrança com a mãe"></div>
            <div class="polaroid"><img src="Foto (11).jpg" alt="Lembrança com a mãe"></div>
        </div>

        <div class="message-container">
            <p class="message">
                Mesmo que você me trate mal às vezes e fale coisas "sabendo que vão me fazer mal", <span class="highlight">você ainda é minha mãe.</span>
            </p>
            <h2>Feliz Dia das Mães!</h2>
            <div class="signature">Com amor, Kauan (<3)</div>
        </div>
    </div>
</body>
</html>
